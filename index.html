<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Gruppo Mare</title>
<link rel="stylesheet" href="style.css">
<!-- Rimuove l'errore del favicon.ico caricando un'icona vuota -->
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<style>
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
    .main-container { 
        display: grid; 
        grid-template-columns: 1fr auto 1fr; 
        width: 100%; 
        align-items: flex-start; 
        margin-top: 20px; 
    }
    
    #game-column { grid-column: 2; display: flex; flex-direction: column; align-items: center; }
    
    #leaderboard {
        grid-column: 3;
        justify-self: start;
        margin-left: 20px;
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        min-width: 280px;
        border: none;
    }
    
    #leaderboard h3 { color: #1b4332; margin-bottom: 20px; border-bottom: 2px solid #b7e4c7; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
    
    #scores-list { list-style: none; padding: 0; margin: 0; }
    
    #scores-list li {
        display: flex;
        justify-content: space-between;
        padding: 12px 15px;
        border-bottom: 1px solid #f0f0f0;
        transition: transform 0.2s;
    }
    
    #scores-list li:last-child { border-bottom: none; }
    #scores-list li:hover { transform: scale(1.02); background-color: #f8fff9; border-radius: 8px; }
    
    .rank-1 { background-color: #fff9db !important; font-weight: bold; border-radius: 8px; color: #856404; }
    .score-value { color: #2d6a4f; font-weight: bold; }

    /* Per schermi piccoli (es. smartphone), mettiamo la classifica sotto il gioco */
    @media (max-width: 900px) {
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #leaderboard { margin-left: 0; margin-top: 20px; }
    }
</style>
</head>

<body>

<h1>Snake Gruppo Mare</h1>

<div id="player-info" style="margin-bottom: 15px; font-size: 1.1em;">
    👤 Giocatore: <span id="player-display" style="color: #2d6a4f; font-weight: bold;">-</span> | 
    ⭐ Punti attuali: <span id="score" style="color: #d90429; font-weight: bold;">0</span>
</div>

<div class="main-container">
    <div id="game-column">
        <canvas id="game" width="400" height="400" style="border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);"></canvas>
    </div>

    <div id="leaderboard">
        <h3>🏆 Top 10 </h3>
        <ul id="scores-list"></ul>
    </div>
</div>

<h2>Immagini sbloccate</h2>
<div id="cards"></div>
